<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dulces Antojos</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: #fff0f6;
  margin: 0;
  padding: 15px;
}

h1{
  text-align: center;
  color: #ff4fa3;
}

.producto{
  background: white;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
  box-shadow: 0 5px 12px rgba(0,0,0,0.08);
}

.producto h3{
  margin: 0 0 8px 0;
}

.producto select,
.producto button{
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
}

.producto button{
  background: #ff4fa3;
  color: white;
  border: none;
  font-weight: bold;
}

#carrito{
  background: white;
  padding: 15px;
  border-radius: 15px;
  margin-top: 20px;
  box-shadow: 0 5px 12px rgba(0,0,0,0.08);
}

.boton-flotante{
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #ff4fa3;
  color: white;
  padding: 14px 25px;
  border-radius: 30px;
  font-weight: bold;
  box-shadow: 0 8px 18px rgba(255,79,163,0.3);
  cursor: pointer;
  display:none;
  animation: latido 1.5s infinite;
}

@keyframes latido{
  0%{transform:translateX(-50%) scale(1);}
  50%{transform:translateX(-50%) scale(1.05);}
  100%{transform:translateX(-50%) scale(1);}
}
</style>
</head>
<body>

<h1>🍓 Dulces Antojos 🍩</h1>

<div class="producto">
  <h3>Postre Tres Leches - $7.000</h3>
  <select id="saborTresLeches">
    <option>Arequipe</option>
    <option>Oreo</option>
    <option>Milo</option>
    <option>Brownie</option>
  </select>
  <button onclick="agregarProducto('Postre Tres Leches',7000,'saborTresLeches')">
    Agregar
  </button>
</div>

<div class="producto">
  <h3>Fresas con Crema - $15.000</h3>
  <select id="saborFresas">
    <option>Tradicional</option>
    <option>Con Nutella</option>
    <option>Con Leche Condensada</option>
  </select>
  <button onclick="agregarProducto('Fresas con Crema',15000,'saborFresas')">
    Agregar
  </button>
</div>

<div id="carrito">
  <h3>🛒 Carrito</h3>
  <ul id="listaCarrito"></ul>
  <p><strong>Total: $<span id="total">0</span></strong></p>
</div>

<div id="botonFlotante" class="boton-flotante" onclick="enviarPedido()">
  💬 Pedir por WhatsApp
</div>

<script>
let carrito=[];
let total=0;

function agregarProducto(nombre,precio,idSabor){
  const sabor=document.getElementById(idSabor).value;
  carrito.push({producto:nombre+" - "+sabor,precio});
  total+=precio;
  actualizarCarrito();
}

function actualizarCarrito(){
  const lista=document.getElementById("listaCarrito");
  lista.innerHTML="";
  carrito.forEach(i=>{
    const li=document.createElement("li");
    li.textContent=i.producto+" - $"+i.precio.toLocaleString("es-CO");
    lista.appendChild(li);
  });
  document.getElementById("total").textContent=total.toLocaleString("es-CO");
  document.getElementById("botonFlotante").style.display=carrito.length>0?"block":"none";
}

function enviarPedido(){
  if(carrito.length===0) return alert("Agrega productos");

  let mensaje="🍓 *DULCES ANTOJOS* 🍩\n\n";
  mensaje+="Hola, quiero hacer este pedido:\n\n";

  carrito.forEach(i=>{
    mensaje+="• "+i.producto+" - $"+i.precio.toLocaleString("es-CO")+"\n";
  });

  mensaje+="\nTotal: $"+total.toLocaleString("es-CO");
  mensaje+="\n\nGracias 💜";

  const numero="573044610933";
  window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`,"_blank");
}
</script>

</body>
</html>
